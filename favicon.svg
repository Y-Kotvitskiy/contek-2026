<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .bg { fill: #819eb4; }
    .letter {
      font-family: "Roboto", sans-serif;
      font-weight: 400;
      font-size: 90px;
      
      /* Fill color of the letter */
      fill: #000000; 
      
      /* Stroke/Outline color and thickness */
      stroke: #d9eced; 
      stroke-width: 2px;
      
      /* Centers the text perfectly */
      text-anchor: middle;
      dominant-baseline: central;
      transform-origin: center;   
      transform: scaleX(0.95);   
    }
  </style>
  <rect width="100%" height="100%" class="bg" rx="20" ry="20" />
  <text x="50" y="50" class="letter">C</text>
</svg>